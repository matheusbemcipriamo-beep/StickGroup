<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Sandbox Multiplayer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #333; font-family: sans-serif; }
    #desktop { width: 100%; height: 100%; position: relative; background: #1a1a1a; overflow: hidden; }
    
    /* Barra de Tarefas estilo Windows */
    #taskbar {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 36px;
      background: #222; border-top: 1px solid #444; display: flex; align-items: center; padding: 0 10px; z-index: 9999;
    }
    .start-btn { background: #0078d7; color: white; border: none; padding: 4px 12px; font-weight: bold; cursor: pointer; }
    
    /* Elementos do Sandbox */
    .cursor-replica {
      position: absolute; width: 14px; height: 14px;
      background: radial-gradient(circle, red 0%, transparent 70%);
      pointer-events: none; z-index: 9998; font-size: 10px; color: #fff; white-space: nowrap;
    }
    .cursor-label { position: absolute; top: 15px; left: 10px; background: rgba(0,0,0,0.6); padding: 2px 4px; border-radius: 3px; }

    .stickman-container { position: absolute; pointer-events: auto; cursor: grab; z-index: 100; display: flex; flex-direction: column; align-items: center; }
    .stickman-container:active { cursor: grabbing; }
    .speech-bubble {
      background: white; border: 2px solid black; border-radius: 8px; padding: 4px 8px;
      font-size: 12px; font-weight: bold; max-width: 150px; text-align: center; margin-bottom: 4px;
      position: relative; word-wrap: break-word; color: black;
    }
    .hp-bar-bg { width: 100%; height: 5px; background: red; border: 1px solid #000; margin-top: 2px; }
    .hp-bar-fill { height: 100%; background: #0f0; width: 100%; transition: width 0.1s ease; }
    .stickman-name { font-size: 11px; color: white; background: rgba(0,0,0,0.5); padding: 1px 3px; border-radius: 3px; }

    /* Janelas Falsas do Sistema */
    .window {
      position: absolute; width: 300px; height: 200px; background: #f0f0f0; border: 1px solid #666;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.5); display: none; flex-direction: column; z-index: 500;
    }
    .window-header { background: #0078d7; color: white; padding: 4px 8px; display: flex; justify-content: space-between; align-items: center; cursor: move; }
    .window-close { background: red; color: white; border: none; width: 20px; height: 20px; cursor: pointer; }
    .window-body { flex: 1; padding: 10px; overflow: auto; color: black; }
  </style>
</head>
<body>

<div id="desktop">
  <div id="myCursor" style="position: absolute; display: none;"></div>

  <div id="paintWindow" class="window" style="left: 40%; top: 30%;">
    <div class="window-header" id="paintHeader">
      <span>Paint Studio</span>
      <button class="window-close" onclick="document.getElementById('paintWindow').style.display='none'">X</button>
    </div>
    <div class="window-body">
      <p>Área de Colisão Sólida</p>
      <canvas id="paintCanvas" width="280" height="130" style="border:1px dashed #999; background:white;"></canvas>
    </div>
  </div>

  <div id="taskbar">
    <button class="start-btn" id="spawnBtn">Injetar Stickman</button>
    <button class="start-btn" style="background:#555; margin-left:5px;" onclick="document.getElementById('paintWindow').style.display='flex'">Abrir Janela</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, remove, onChildAdded, onChildRemoved, onChildChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // Configuração padrão do Firebase Realtime Database
  const firebaseConfig = {
    databaseURL: "https://SEU-FIREBASE-DATABASE-URL-AQUI.firebaseio.com" 
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Variáveis Globais de Sessão Multiplayer
  const roomId = "sandbox_main_room";
  const myId = "usr_" + Math.random().toString(36).substr(2, 9);
  const myNick = prompt("Digite seu Nickname para a Matrix:") || "User_" + Math.floor(Math.random() * 900);
  
  let roomRef = ref(db, `desktopRooms/${roomId}`);
  let stickmans = {};
  let cursors = {};

  // Chaves de Comunicação da IA (Identidade Groq/Desktop_Sandbox)
  const API_KEY = "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"; 
  const API_URL = "https://api.groq.com/openai/v1/chat/completions";

  // ── FUNÇÃO CENTRAL DE INTEGRAÇÃO COGNITIVA (GROQ) ────────────────────────────────────────────────
  async function askAi(systemPrompt, userPrompt, memoryCtx = [], temp = 0.85) {
    const messages = [{ role: "system", content: systemPrompt }];
    memoryCtx.slice(-6).forEach(mem => {
      messages.push({ role: "user", content: mem.user });
      if (mem.ai) messages.push({ role: "assistant", content: mem.ai });
    });
    messages.push({ role: "user", content: userPrompt });

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({ model: "llama-3.1-8b-instant", messages, temperature: temp })
      });
      const data = await res.json();
      return data.choices[0].message.content.trim();
    } catch (e) {
      console.error("Erro na Matrix de Comunicação IA:", e);
      return "...";
    }
  }

  // Avaliação Inicial Baseada no Nome do Stickman (Cópia exata da lógica Python)
  async function evaluateSkillsAndPrompt(name) {
    const evalPrompt = `Analise estritamente o peso e a imponência do nome '${name}' para um RPG de combate sandbox. 
    1. Nome fraco/comum (ex: 'Bob'): hp baixo (10-50), todas skills false.
    2. Nome mediano: hp 60-110, poucas skills true.
    3. Nome de Boss/Deus (ex: 'Caine', 'God', 'Carlos IA'): hp massivo (150-500), múltiplos superpoderes destructivos.
    Responda EXCLUSIVAMENTE em JSON válido, sem markdown: {"hp": 100, "fly": false, "laser": false, "fire": false, "speed": false}`;

    const res = await askAi("Você é um balanceador rigid de atributos de jogos.", evalPrompt, [], 0.2);
    try {
      const match = res.match(/\{.*\}/s);
      return JSON.parse(match[0]);
    } catch {
      return { hp: 100, fly: false, laser: false, fire: false, speed: false };
    }
  }

  // ── REPLICAÇÃO DOS MOUSES (CORRIGIDO DEFINITIVAMENTE COM THROTTLE) ────────────────────────────────
  function setupCursorTracking() {
    const desktop = document.getElementById('desktop');
    let lastUpdate = 0;

    desktop.addEventListener('mousemove', e => {
      const now = Date.now();
      // O Throttle limita o fluxo absurdo de escrita no Firebase para preservar sincronia
      if (now - lastUpdate > 60) { 
        lastUpdate = now;
        const pctX = (e.clientX / window.innerWidth) * 100;
        const pctY = (e.clientY / window.innerHeight) * 100;
        
        update(ref(db, `desktopRooms/${roomId}/cursors/${myId}`), {
          x: pctX, y: pctY, nick: myNick, t: now
        });
      }
    });

    // Limpeza de mouses inativos (Desconexão)
    window.addEventListener('beforeunload', () => {
      remove(ref(db, `desktopRooms/${roomId}/cursors/${myId}`));
    });
  }

  // Ouvinte de Cursores Remotos
  onValue(ref(db, `desktopRooms/${roomId}/cursors`), snapshot => {
    const data = snapshot.val() || {};
    const desktop = document.getElementById('desktop');
    
    // Remover antigos
    Object.keys(cursors).forEach(id => {
      if (!data[id] || id === myId) {
        cursors[id]?.remove();
        delete cursors[id];
      }
    });

    // Atualizar / Adicionar
    Object.keys(data).forEach(id => {
      if (id === myId) return;
      const cData = data[id];
      
      let cEl = cursors[id];
      if (!cEl) {
        cEl = document.createElement('div');
        cEl.className = 'cursor-replica';
        cEl.innerHTML = `<div class="cursor-label">${cData.nick}</div>`;
        desktop.appendChild(cEl);
        cursors[id] = cEl;
      }
      
      const realX = (cData.x / 100) * window.innerWidth;
      const realY = (cData.y / 100) * window.innerHeight;
      cEl.style.left = realX + 'px';
      cEl.style.top = realY + 'px';
    });
  });

  // ── INJEÇÃO E INICIALIZAÇÃO DE STICKMANS ─────────────────────────────────────────────────────────
  function injectItem(name) {
    const x = Math.random() * (window.innerWidth - 100);
    const y = 50;

    // Canvas básico temporário gerando a silhueta clássica de Stickman do Sandbox
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = 60; tempCanvas.height = 60;
    const tCtx = tempCanvas.getContext('2d');
    tCtx.strokeStyle = "white"; tCtx.lineWidth = 3;
    // Cabeça
    tCtx.beginPath(); tCtx.arc(30, 15, 8, 0, Math.PI * 2); tCtx.stroke();
    // Corpo
    tCtx.beginPath(); tCtx.moveTo(30, 23); tCtx.lineTo(30, 42); tCtx.stroke();
    // Braços
    tCtx.beginPath(); tCtx.moveTo(15, 28); tCtx.lineTo(45, 28); tCtx.stroke();
    // Pernas
    tCtx.beginPath(); tCtx.moveTo(30, 42); tCtx.lineTo(15, 58); tCtx.moveTo(30, 42); tCtx.lineTo(45, 58); tCtx.stroke();

    const dataUrl = tempCanvas.toDataURL();

    const payload = {
      action: "stickman", name, x, y, w: 60, h: 60,
      dataUrl, creator: myNick,
      hp: 100, max_hp: 100,
      pontos_espirito: 1000,
      alignment: "Caótico",
      traumas: { mouse: 0, user_delet: 0, window: 0, rivals: 0, weapons: 0 },
      skills: { fly: false, speed: false, laser: false, fire: false },
      speech: "Instanciando consciência...",
      timestamp: Date.now()
    };

    const newRef = push(ref(db, `desktopRooms/${roomId}/items`));
    set(newRef, payload);

    // Avalia o nome assincronamente e sobrescreve com as propriedades reais calculadas pela IA
    evaluateSkillsAndPrompt(name).then(stats => {
      let alignment = "Pacífico";
      const nLow = name.toLowerCase();
      if (["god", "boss", "evil", "caine", "carlos ia", "hacker"].some(v => nLow.includes(v))) {
        alignment = "Destrutor";
      } else {
        alignment = ["Pacífico", "Caótico", "Hostil"][Math.floor(Math.random() * 3)];
      }

      update(ref(db, `desktopRooms/${roomId}/items/${newRef.key}`), {
        hp: stats.hp || 100,
        max_hp: stats.hp || 100,
        skills: stats,
        alignment: alignment,
        speech: `Eu sou ${name}. Categoria: ${alignment}.`
      });

      setTimeout(() => update(ref(db, `desktopRooms/${roomId}/items/${newRef.key}`), { speech: "" }), 3500);
    });
  }

  document.getElementById('spawnBtn').addEventListener('click', () => {
    const nome = prompt("Nome do Stickman para análise de poder:");
    if (nome) injectItem(nome);
  });

  // ── GERENCIAMENTO DA FILA VISUAL NO DOM ──────────────────────────────────────────────────────────
  onChildAdded(ref(db, `desktopRooms/${roomId}/items`), snapshot => {
    const fbKey = snapshot.key;
    const data = snapshot.val();
    createStickmanVisual(fbKey, data);
  });

  onChildChanged(ref(db, `desktopRooms/${roomId}/items`), snapshot => {
    const fbKey = snapshot.key;
    const data = snapshot.val();
    const sm = stickmans[fbKey];
    if (sm) {
      sm.data = data;
      // Sincroniza balão de fala
      const speechBubble = sm.el.querySelector('.speech-bubble');
      if (data.speech) {
        speechBubble.style.display = 'block';
        speechBubble.innerText = data.speech;
      } else {
        speechBubble.style.display = 'none';
      }
      // Sincroniza barra de vida
      const hpFill = sm.el.querySelector('.hp-bar-fill');
      const pct = (data.hp / data.max_hp) * 100;
      hpFill.style.width = Math.max(0, pct) + "%";
    }
  });

  onChildRemoved(ref(db, `desktopRooms/${roomId}/items`), snapshot => {
    const fbKey = snapshot.key;
    if (stickmans[fbKey]) {
      stickmans[fbKey].el.remove();
      delete stickmans[fbKey];
    }
  });

  function createStickmanVisual(fbKey, data) {
    const desktop = document.getElementById('desktop');
    const container = document.createElement('div');
    container.className = 'stickman-container';
    container.style.left = data.x + 'px';
    container.style.top = data.y + 'px';

    container.innerHTML = `
      <div class="speech-bubble" style="display: ${data.speech ? 'block' : 'none'}">${data.speech || ''}</div>
      <canvas class="smCanvas" width="${data.w}" height="${data.h}"></canvas>
      <div class="stickman-name">${data.name}</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill"></div></div>
    `;

    desktop.appendChild(container);

    const canvas = container.querySelector('.smCanvas');
    const img = new Image();
    img.src = data.dataUrl;
    img.onload = () => {
      canvas.getContext('2d').drawImage(img, 0, 0, data.w, data.h);
    };

    stickmans[fbKey] = {
      el: container,
      cnv: canvas,
      fbKey: fbKey,
      data: data,
      readyImg: img,
      vx: 0, vy: 0,
      targetX: data.x,
      lastDecision: 0,
      frame: Math.floor(Math.random() * 100),
      dragging: false
    };

    // Evento de arrastar nativo para interações físicas do Usuário
    container.addEventListener('mousedown', e => {
      stickmans[fbKey].dragging = true;
      let shiftX = e.clientX - container.getBoundingClientRect().left;
      let shiftY = e.clientY - container.getBoundingClientRect().top;

      function moveAt(pageX, pageY) {
        container.style.left = (pageX - shiftX) + 'px';
        container.style.top = (pageY - shiftY) + 'px';
      }

      function onMouseMove(ev) {
        moveAt(ev.clientX, ev.clientY);
      }

      document.addEventListener('mousemove', onMouseMove);

      document.addEventListener('mouseup', () => {
        document.removeEventListener('mousemove', onMouseMove);
        if (stickmans[fbKey]) {
          stickmans[fbKey].dragging = false;
          stickmans[fbKey].targetX = parseFloat(container.style.left);
          // Incrementa trauma por manipulação do mouse
          const tMouse = (stickmans[fbKey].data.traumas?.mouse || 0) + 1;
          update(ref(db, `desktopRooms/${roomId}/items/${fbKey}`), {
            x: parseFloat(container.style.left),
            y: parseFloat(container.style.top),
            "traumas/mouse": tMouse
          });
        }
      }, { once: true });
    });
  }

  // ── O MOTOR DE FÍSICA E INTELIGÊNCIA ARTIFICIAL COMPLETO (IDENTICO AO DESKTOP_SANDBOX) ───────────
  const gravity = 0.85;

  function physicsLoop() {
    const now = Date.now();
    const dw = window.innerWidth;
    const dh = window.innerHeight - 36; // Compensação da Barra de Tarefas

    Object.values(stickmans).forEach(sm => {
      if (sm.dragging) return;

      const stats = sm.data;
      if (!stats || stats.hp <= 0) return;

      let curX = parseFloat(sm.el.style.left) || stats.x;
      let curY = parseFloat(sm.el.style.top) || stats.y;

      // Fatores modificadores de Poder das Skills Calculadas
      const speedFactor = stats.skills?.speed ? 2.8 : 1.0;
      const thinkTime = stats.skills?.speed ? 700 : 2200;

      // ── MÓDULO COGNITIVO AUTÔNOMO ──
      if (now - sm.lastDecision > thinkTime) {
        sm.lastDecision = now;

        // Decisão de movimentação horizontal errática
        if (Math.random() > 0.25) {
          sm.targetX = Math.random() * (dw - stats.w);
        }

        // Impulso de Pulo Autônomo baseado no vetor Y (se no solo e sem skill de voo)
        if (Math.random() > 0.68 && sm.vy === 0 && !stats.skills?.fly) {
          sm.vy = -(Math.random() * 6 + 11);
        }

        // Execução da fala da IA - Apenas o Dono/Criador original processa para evitar spam de API na sala
        if (stats.creator === myNick && Math.random() > 0.85) {
          const prompt = `Você é o stickman autônomo '${stats.name}' operando em uma Matrix Desktop. Alinhamento: ${stats.alignment}. Sanidade Espiritual: ${stats.pontos_espirito}/1000. Traumas acumulados do Mouse: ${stats.traumas?.mouse || 0}. Diga uma frase de efeito curta, irônica ou insana condizente com seu estado (MÁXIMO 6 PALAVRAS).`;
          askAi(prompt, "Manifeste-se.").then(res => {
            update(ref(db, `desktopRooms/${roomId}/items/${sm.fbKey}`), { speech: res });
            setTimeout(() => {
              if (stickmans[sm.fbKey]) update(ref(db, `desktopRooms/${roomId}/items/${sm.fbKey}`), { speech: "" });
            }, 4000);
          });
        }
      }

      // ── VETORES DE DESLOCAMENTO ──
      sm.vx += (curX < sm.targetX ? 0.70 : -0.70) * speedFactor;
      sm.vx *= 0.84; // Coeficiente de atrito/desaceleração horizontal
      curX += sm.vx;

      if (stats.skills?.fly) {
        // Se voa, o vetor Y oscila flutuando na metade superior da tela
        sm.vy += (curY < (dh / 2.5) ? 0.35 : -0.35) * speedFactor;
        sm.vy *= 0.88;
      } else {
        // Se não voa, aplica a aceleração de gravidade idêntica ao Pygame
        sm.vy += gravity;
      }
      curY += sm.vy;

      // ── SISTEMA SÓLIDO DE COLISÃO COM JANELAS (Eixo X/Y) ──
      let currentFloor = dh;
      const paintWin = document.getElementById('paintWindow');
      
      if (paintWin && paintWin.style.display !== 'none') {
        const px = paintWin.offsetLeft;
        const py = paintWin.offsetTop;
        const pw = paintWin.offsetWidth;
        
        // Verifica se a base/pés do stickman está alinhada horizontalmente com a estrutura da janela
        if (curX + (stats.w / 2) >= px && curX + (stats.w / 2) <= px + pw) {
          // Detecta colisão de queda no topo da janela do Paint Studio
          if (curY + stats.h <= py + 22 && sm.vy >= 0 && (curY + stats.h + sm.vy) >= py) {
            currentFloor = py;
          }
        }
      }

      // Trava de solo/piso
      if (curY + stats.h >= currentFloor) {
        curY = currentFloor - stats.h;
        sm.vy = 0;
      }

      // Restrições de bordas laterais do monitor
      if (curX < 0) { curX = 0; sm.vx *= -0.5; }
      if (curX > dw - stats.w) { curX = dw - stats.w; sm.vx *= -0.5; }

      // Atualiza a posição em tempo real no DOM local
      sm.el.style.left = curX + 'px';
      sm.el.style.top = curY + 'px';

      // Espelhamento visual com base na direção do vetor velocidade
      if (sm.vx < -0.2) sm.cnv.style.transform = 'scaleX(-1)';
      else if (sm.vx > 0.2) sm.cnv.style.transform = 'scaleX(1)';

      // Animação procedural interna (Bobbing/Balanço de movimento)
      sm.frame++;
      const sCtx = sm.cnv.getContext('2d');
      sCtx.clearRect(0, 0, stats.w, stats.h);
      if (sm.readyImg) {
        const bob = (sm.vy === 0 && Math.abs(sm.vx) > 0.5) ? Math.sin(sm.frame * 0.25) * 3.5 : 0;
        sCtx.drawImage(sm.readyImg, 0, bob, stats.w, stats.h);
      }

      // ── MOTOR DE COMBATE E HITBOX (Sincronizado via Criador para balanceamento de rede) ──
      if (stats.creator === myNick && sm.frame % 12 === 0) {
        update(ref(db, `desktopRooms/${roomId}/items/${sm.fbKey}`), { x: curX, y: curY });

        Object.values(stickmans).forEach(other => {
          if (other.fbKey === sm.fbKey) return; // Evitar autoflagelo

          const ox = parseFloat(other.el.style.left);
          const oy = parseFloat(other.el.style.top);
          const dist = Math.hypot(curX - ox, curY - oy);

          // Alcance de agressividade padrão do sandbox
          if (dist < 90 && stats.alignment !== "Pacífico") {
            if (Math.random() < 0.15) { // Probabilidade de ataque ativo por frame processado
              let dmg = 6;
              let attackColor = "rgba(255, 255, 255, 0.8)";

              if (stats.skills?.laser) { dmg = 15; attackColor = "#00ffff"; }
              else if (stats.skills?.fire) { dmg = 10; attackColor = "#ffaa00"; }

              const finalHp = Math.max(0, (other.data.hp || 100) - dmg);
              
              // Atualiza o estado no Firebase
              update(ref(db, `desktopRooms/${roomId}/items/${other.fbKey}`), { hp: finalHp });

              // Renderização do feixe de dano visual (Hitbox visível) via DOM
              const fx = document.createElement('div');
              fx.style.cssText = `position:absolute; left:${curX + (stats.w / 2)}px; top:${curY + (stats.h / 2)}px; width:${dist}px; height:3px; background:${attackColor}; transform-origin: left center; z-index: 1000; pointer-events: none; box-shadow: 0 0 6px ${attackColor};`;
              const angle = Math.atan2(oy - curY, ox - curX) * 180 / Math.PI;
              fx.style.transform = `rotate(${angle}deg)`;
              document.getElementById('desktop').appendChild(fx);
              setTimeout(() => fx.remove(), 120);

              // Eliminação se zerar a vida útil
              if (finalHp <= 0) {
                remove(ref(db, `desktopRooms/${roomId}/items/${other.fbKey}`));
              }
            }
          }
        });
      }
    });

    requestAnimationFrame(physicsLoop);
  }

  // ── INICIALIZADORES DO SISTEMA ──
  setupCursorTracking();
  // Inicializa o laço físico principal de renderização
  requestAnimationFrame(physicsLoop);

  // Drag funcional para as Janelas Falsas do Monitor
  function makeWindowDraggable(winId, headerId) {
    const win = document.getElementById(winId);
    const header = document.getElementById(headerId);
    let x = 0, y = 0, nx = 0, ny = 0;
    
    header.onmousedown = e => {
      e.preventDefault();
      x = e.clientX; y = e.clientY;
      document.onmousemove = ev => {
        ev.preventDefault();
        nx = x - ev.clientX; ny = y - ev.clientY;
        x = ev.clientX; y = ev.clientY;
        win.style.top = (win.offsetTop - ny) + "px";
        win.style.left = (win.offsetLeft - nx) + "px";
      };
      document.onmouseup = () => {
        document.onmousemove = null;
        document.onmouseup = null;
      };
    };
  }
  makeWindowDraggable('paintWindow', 'paintHeader');

</script>
</body>
</html>
