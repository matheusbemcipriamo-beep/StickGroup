<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Desktop - Multiplayer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── LOBBY ── */
  #lobbyScreen {
    position: fixed; inset: 0;
    background: #0a0a12;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
    color: #d3d3d3;
    z-index: 999;
  }
  #lobbyScreen h1 {
    font-size: 32px; color: #ffcc00;
    text-transform: uppercase; letter-spacing: 4px;
    text-shadow: 0 0 18px #ff990066;
    margin-bottom: 6px;
  }
  #lobbyScreen p.sub { font-size: 12px; color: #666; margin-bottom: 30px; }
  .lobby-box {
    background: #141414;
    border: 2px solid #ff9900;
    box-shadow: 0 0 30px #ff990022;
    padding: 30px; border-radius: 8px;
    width: 340px; text-align: center;
  }
  .lobby-box input {
    width: 100%; padding: 12px;
    background: #0d0d0d; border: 1px solid #333;
    color: #fff; font-family: monospace;
    border-radius: 4px; margin-bottom: 15px;
    text-align: center; outline: none;
  }
  .lobby-box input:focus { border-color: #ffcc00; }
  .lobby-box button {
    width: 100%; padding: 12px;
    background: #ff9900; border: none;
    color: #000; font-weight: bold;
    font-family: monospace; font-size: 14px;
    text-transform: uppercase; cursor: pointer;
    border-radius: 4px; transition: 0.2s;
  }
  .lobby-box button:hover { background: #ffcc00; }

  /* ── DESKTOP AREA ── */
  #desktopArea {
    position: fixed; inset: 0;
    background: #008080; /* Clássico verde Windows XP */
    overflow: hidden;
    display: none;
    user-select: none;
  }

  /* ── TASKBAR XP ── */
  #xpTaskbar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 36px; background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #1b52e3 18%, #174be6 57%, #1946d2 90%, #245edb 100%);
    border-top: 1px solid #1a42b8;
    z-index: 500; display: flex; align-items: center; justify-content: space-between;
    padding: 0 10px; box-shadow: 0 -2px 5px rgba(0,0,0,0.3);
  }
  #xpStartBtn {
    height: 30px; width: 85px;
    background: linear-gradient(to bottom, #388a24 0%, #61bd46 10%, #3e962b 25%, #2a7319 60%, #1e5212 100%);
    border: none; border-top-right-radius: 6px; border-bottom-right-radius: 6px;
    box-shadow: 2px 2px 3px rgba(0,0,0,0.4);
    color: #fff; font-family: 'Tahoma', sans-serif; font-weight: bold; font-style: italic;
    font-size: 15px; text-shadow: 1px 1px 1px #000;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  #xpStartBtn:hover { filter: brightness(1.1); }
  #xpClock {
    color: #fff; font-family: 'Tahoma', sans-serif; font-size: 12px;
    background: linear-gradient(to bottom, #0972a9 0%, #1293d7 12%, #0a73aa 26%, #0d5985 65%, #053655 100%);
    border-left: 1px solid #105986; height: 100%; display: flex; align-items: center;
    padding: 0 15px; margin-right: -10px;
  }

  /* Menu Iniciar */
  #xpStartMenu {
    position: absolute; bottom: 36px; left: 0;
    background: #2d6fc0; border: 2px solid #163d72;
    color: #fff; font-family: 'Tahoma', sans-serif; font-size: 12px;
    width: 180px; z-index: 600; box-shadow: 3px -3px 8px rgba(0,0,0,0.5);
    display: none;
  }
  .start-menu-item {
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #23589b;
  }
  .start-menu-item:hover { background: #2567be; }

  /* ── ELEMENTOS DE JOGO (STICKMANS / ITENS) ── */
  .sandbox-entity {
    position: absolute;
    cursor: grab;
    touch-action: none;
    z-index: 100;
    transform-origin: center;
  }
  .sandbox-entity:active { cursor: grabbing; }
  .entity-img {
    width: 100%; height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
  .entity-label {
    position: absolute; top: -18px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: #ffcc00;
    padding: 1px 6px; font-family: monospace; font-size: 10px;
    border-radius: 3px; white-space: nowrap; pointer-events: none;
  }

  /* ── REMOTES MOUSES ── */
  .remote-mouse {
    position: absolute;
    width: 14px; height: 20px;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" stroke="black" stroke-width="2"><path d="M4.5 2v17.5l4.8-4.7 3.6 8.3 3.1-1.4-3.6-8.2 6.1-.5z"/></svg>') no-repeat;
    pointer-events: none;
    z-index: 9999;
    font-family: monospace;
    font-size: 11px;
    color: white;
    text-shadow: 1px 1px 2px black;
    white-space: nowrap;
    transition: transform 0.05s linear;
  }

  /* ── PAINT STUDIO WINDOW ── */
  #paintWindow {
    position: absolute; top: 50px; left: 50px;
    width: 600px; height: 650px;
    background: #f1f1f1; border: 3px solid #004eaf;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
    z-index: 800; display: none; flex-direction: column;
    font-family: sans-serif;
  }
  .window-titlebar {
    background: linear-gradient(to right, #0058e6 0%, #3a83ff 100%);
    color: white; font-weight: bold; padding: 6px 10px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: move;
  }
  .window-close {
    background: #e81123; color: white; border: none;
    width: 22px; height: 22px; font-weight: bold; cursor: pointer;
  }
  .window-content { flex: 1; display: flex; flex-direction: column; background: white; position: relative; }
  iframe { border: none; width: 100%; height: 100%; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, remove, update, onChildAdded, onChildRemoved, onChildChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://stickland-3ccaa-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Variáveis globais do sistema de sessão
  let roomId = "";
  let myId = "player_" + Math.random().toString(36).substring(2, 9);
  let myName = "Jogador";

  // Estado Local de Simulação de Stickmans (Física Local sincronizada ou rodada em paralelo)
  const localEntities = {};
  const remoteMousesContainer = document.getElementById('desktopArea');

  // Configurações Globais de Física Exata do Python
  const GRAVITY = 0.45;
  const BOUNCE = -0.3;
  const FRICTION = 0.98;
  const SPRITE_SIZE = 120; // Tamanho igual ao Python

  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('joinBtn').addEventListener('click', joinRoom);
    document.getElementById('xpStartBtn').addEventListener('click', toggleStartMenu);
    setupClock();
    setupWindowDrag();
  });

  function setupClock() {
    setInterval(() => {
      const now = new Date();
      document.getElementById('xpClock').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
  }

  function toggleStartMenu() {
    const menu = document.getElementById('xpStartMenu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  }

  function joinRoom() {
    const rInput = document.getElementById('roomInput').value.trim();
    const nInput = document.getElementById('nameInput').value.trim();

    if(!rInput || !nInput) {
      alert("Por favor, preencha a Sala e o seu Nome!");
      return;
    }

    roomId = rInput;
    myName = nInput;

    document.getElementById('lobbyScreen').style.display = 'none';
    document.getElementById('desktopArea').style.display = 'block';

    // 1. Registrar presença do Player e configurar desconexão
    const playerRef = ref(db, `desktopRooms/${roomId}/players/${myId}`);
    set(playerRef, {
      name: myName,
      active: true,
      x: 0,
      y: 0
    });
    
    // Configura remoção automática ao fechar a aba
    window.addEventListener('beforeunload', () => {
      set(ref(db, `desktopRooms/${roomId}/players/${myId}`), null);
    });

    // 2. Escutar mouses da sala (REPLICATE MOUSES CORRIGIDO)
    listenMouses();

    // 3. Rastrear movimento do mouse do jogador local
    window.addEventListener('mousemove', (e) => {
      update(ref(db, `desktopRooms/${roomId}/players/${myId}`), {
        x: e.clientX,
        y: e.clientY
      });
    });

    // 4. Escutar criações de Stickmans/Itens na Sala do Firebase
    listenItems();

    // 5. Iniciar Loop de Física Idêntico ao Python
    setInterval(updatePhysicsLoop, 20); // ~50 FPS constante
  }

  // CORREÇÃO E IMPLEMENTAÇÃO DO MOUSE REPLICATION
  function listenMouses() {
    const playersRef = ref(db, `desktopRooms/${roomId}/players`);
    
    onValue(playersRef, (snapshot) => {
      const playersData = snapshot.val() || {};
      
      // Remover cursores de quem saiu ou está inativo
      const currentElements = document.querySelectorAll('.remote-mouse');
      currentElements.forEach(el => {
        const id = el.getAttribute('data-id');
        if (!playersData[id] || id === myId) {
          el.remove();
        }
      });

      // Desenhar ou atualizar mouses ativos dos outros players
      for (let pId in playersData) {
        if (pId === myId) continue; // Ignora o próprio mouse
        
        let mouseEl = document.querySelector(`.remote-mouse[data-id="${pId}"]`);
        if (!mouseEl) {
          mouseEl = document.createElement('div');
          mouseEl.className = 'remote-mouse';
          mouseEl.setAttribute('data-id', pId);
          remoteMousesContainer.appendChild(mouseEl);
        }
        
        // Atualiza a posição na tela e coloca o nome do jogador do lado
        mouseEl.style.left = playersData[pId].x + 'px';
        mouseEl.style.top = playersData[pId].y + 'px';
        mouseEl.innerHTML = `&nbsp;&nbsp;&nbsp;&nbsp;${playersData[pId].name || 'Jogador'}`;
      }
    });
  }

  // ESCUTAR E RENDERIZAR ITENS/STICKMANS DO BANCO DE DADOS
  function listenItems() {
    const itemsRef = ref(db, `desktopRooms/${roomId}/items`);

    onChildAdded(itemsRef, (snapshot) => {
      const id = snapshot.key;
      const data = snapshot.val();
      createEntityElement(id, data);
    });

    onChildRemoved(itemsRef, (snapshot) => {
      const id = snapshot.key;
      if (localEntities[id]) {
        localEntities[id].element.remove();
        delete localEntities[id];
      }
    });

    onChildChanged(itemsRef, (snapshot) => {
      const id = snapshot.key;
      const data = snapshot.val();
      if (localEntities[id] && localEntities[id].dragging) {
        // Se outro jogador estiver arrastando, sincroniza posição na tela
        localEntities[id].x = data.x;
        localEntities[id].y = data.y;
        localEntities[id].element.style.left = data.x + 'px';
        localEntities[id].element.style.top = data.y + 'px';
      }
    });
  }

  // CRIAÇÃO DOS STICKMANS COM ATRIBUTOS IDÊNTICOS DO PYTHON
  function createEntityElement(id, data) {
    const el = document.createElement('div');
    el.className = 'sandbox-entity';
    el.style.width = SPRITE_SIZE + 'px';
    el.style.height = SPRITE_SIZE + 'px';
    el.style.left = (data.x || 100) + 'px';
    el.style.top = (data.y || 100) + 'px';

    const img = document.createElement('img');
    img.className = 'entity-img';
    // Se tiver imagem base64 injetada pelo paint_studio usa ela, se não usa a padrão
    img.src = data.image_b64 ? `data:image/png;base64,${data.image_b64}` : (data.image_path || 'https://i.imgur.com/w9O79G4.png');
    el.appendChild(img);

    if (data.name) {
      const label = document.createElement('div');
      label.className = 'entity-label';
      label.textContent = data.name;
      el.appendChild(label);
    }

    document.getElementById('desktopArea').appendChild(el);

    // Estrutura de inteligência, gravidade e habilidades IDÊNTICAS do Python
    localEntities[id] = {
      id: id,
      element: el,
      type: data.action || 'stickman',
      name: data.name || '',
      x: data.x || 100,
      y: data.y || 100,
      vx: (Math.random() * 6) - 3, // Velocidade inicial aleatória x
      vy: 0,                       // Velocidade inicial y
      dragging: false,
      // Habilidades/Poderes carregados (Ex: velocidade, passiva)
      skills: {
        speed: Math.random() < 0.25, // 25% de chance de ser super veloz igual no Python
        climer: Math.random() < 0.15
      },
      // Estados internos do Loop de IA Python
      aiTimer: 0,
      aiState: 'idle'
    };

    // Implementação de Drag & Drop (Arrastar com o mouse) sincronizado
    el.addEventListener('mousedown', (e) => {
      localEntities[id].dragging = true;
      localEntities[id].vx = 0;
      localEntities[id].vy = 0;
      
      const offsetX = e.clientX - localEntities[id].x;
      const offsetY = e.clientY - localEntities[id].y;

      function onMouseMove(moveEvent) {
        if (!localEntities[id].dragging) return;
        let nx = moveEvent.clientX - offsetX;
        let ny = moveEvent.clientY - offsetY;

        localEntities[id].x = nx;
        localEntities[id].y = ny;
        el.style.left = nx + 'px';
        el.style.top = ny + 'px';

        // Atualizar no Firebase em tempo real para os outros verem arrastando
        update(ref(db, `desktopRooms/${roomId}/items/${id}`), { x: nx, y: ny });
      }

      function onMouseUp() {
        localEntities[id].dragging = false;
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
      }

      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
    });
  }

  // LOOP DE FÍSICA E INTELIGÊNCIA ARTIFICIAL IDÊNTICO AO DESKTOP_SANDBOX.PY
  function updatePhysicsLoop() {
    const screenW = window.innerWidth;
    const screenH = window.innerHeight - 36; // Desconta a barra de tarefas

    for (let id in localEntities) {
      const ent = localEntities[id];
      if (ent.dragging) continue; // Se estiver sendo arrastado, a física não atua

      // ── 1. APLICAÇÃO DE GRAVIDADE EXATA ──
      ent.vy += GRAVITY;
      ent.x += ent.vx;
      ent.y += ent.vy;

      // ── 2. INTELIGÊNCIA ARTIFICIAL (IA) E MUDANÇA DE ESTADOS ──
      if (ent.type === 'stickman') {
        ent.aiTimer++;
        
        // A cada certo tempo (Equivalente ao random.uniform do Python) muda o foco
        if (ent.aiTimer > (ent.skills.speed ? 40 : 80)) {
          ent.aiTimer = 0;
          const r = Math.random();
          if (r < 0.4) {
            ent.aiState = 'walk_left';
            ent.vx = ent.skills.speed ? -4.5 : -1.8; // Velocidade baseada na skill igual Python
            ent.element.style.transform = 'scaleX(-1)'; // Olha para a esquerda
          } else if (r < 0.8) {
            ent.aiState = 'walk_right';
            ent.vx = ent.skills.speed ? 4.5 : 1.8;  // Olha para a direita
            ent.element.style.transform = 'scaleX(1)';
          } else {
            ent.aiState = 'idle';
            ent.vx = 0;
          }
        }
      }

      // Atrito com o Ar / Chão
      ent.vx *= FRICTION;

      // ── 3. COLISÕES COM AS BORDAS DA TELA (PISO, TETO E LATERAIS) ──
      // Colisão Piso (Chão da tela / Cima da Taskbar)
      if (ent.y + SPRITE_SIZE >= screenH) {
        ent.y = screenH - SPRITE_SIZE;
        ent.vy = ent.vy * BOUNCE; // Quica baseado no BOUNCE do Python
        
        // Se o impacto do quique for muito baixo, para de quicar
        if (Math.abs(ent.vy) < 1) ent.vy = 0;
      }

      // Colisão Teto
      if (ent.y < 0) {
        ent.y = 0;
        ent.vy = 0;
      }

      // Colisão Lateral Esquerda
      if (ent.x < 0) {
        ent.x = 0;
        ent.vx = -ent.vx * 0.6; // Inverte o sentido do movimento
        if (ent.aiState === 'walk_left') {
          ent.aiState = 'walk_right';
          ent.element.style.transform = 'scaleX(1)';
        }
      }

      // Colisão Lateral Direita
      if (ent.x + SPRITE_SIZE > screenW) {
        ent.x = screenW - SPRITE_SIZE;
        ent.vx = -ent.vx * 0.6;
        if (ent.aiState === 'walk_right') {
          ent.aiState = 'walk_left';
          ent.element.style.transform = 'scaleX(-1)';
        }
      }

      // ── 4. ATUALIZAR ELEMENTO NA TELA HTML ──
      ent.element.style.left = ent.x + 'px';
      ent.element.style.top = ent.y + 'px';
    }
  }

  // ── GERENCIAMENTO DA JANELA DO PAINT STUDIO ──
  window.openPaintStudio = function() {
    const win = document.getElementById('paintWindow');
    win.style.display = 'flex';
    toggleStartMenu(); // Fecha o menu iniciar ao abrir
  };

  window.closePaintStudio = function() {
    document.getElementById('paintWindow').style.display = 'none';
  };

  window.clearDesktopRoom = function() {
    if (confirm('Remover todos os itens e Stickmans desta sala?')) {
      remove(ref(db, `desktopRooms/${roomId}/items`));
      toggleStartMenu();
    }
  };

  window.leaveDesktopRoom = function() {
    set(ref(db, `desktopRooms/${roomId}/players/${myId}`), null);
    location.reload();
  };

  function setupWindowDrag() {
    const titlebar = document.querySelector('.window-titlebar');
    const win = document.getElementById('paintWindow');
    let isDraggingWin = false;
    let offsetWinX, offsetWinY;

    titlebar.addEventListener('mousedown', (e) => {
      if(e.target.className === 'window-close') return;
      isDraggingWin = true;
      offsetWinX = e.clientX - win.offsetLeft;
      offsetWinY = e.clientY - win.offsetTop;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDraggingWin) return;
      win.style.left = (e.clientX - offsetWinX) + 'px';
      win.style.top = (e.clientY - offsetWinY) + 'px';
    });

    window.addEventListener('mouseup', () => {
      isDraggingWin = false;
    });
  }
</script>
</head>
<body>

  <div id="lobbyScreen">
    <h1>Stickman Sandbox</h1>
    <p class="sub">Multiplayer Desktop Engine</p>
    <div class="lobby-box">
      <input type="text" id="roomInput" placeholder="Código da Sala (Ex: sala1)" value="sala1">
      <input type="text" id="nameInput" placeholder="Seu Nome/Nickname">
      <button id="joinBtn">Entrar na Sala</button>
    </div>
  </div>

  <div id="desktopArea">
    
    <div id="paintWindow">
      <div class="window-titlebar">
        <span>🎨 Estúdio de Criação Paint</span>
        <button class="window-close" onclick="closePaintStudio()">X</button>
      </div>
      <div class="window-content">
        <iframe src="paint_studio.html"></iframe>
      </div>
    </div>

    <div id="xpTaskbar">
      <button id="xpStartBtn">Iniciar</button>
      <div id="xpClock">00:00</div>
    </div>

    <div id="xpStartMenu">
      <div class="start-menu-item" onclick="openPaintStudio()">🎨 Abrir Paint Studio</div>
      <div class="start-menu-item" onclick="clearDesktopRoom()">🗑 Limpar Sala (Reset)</div>
      <div class="start-menu-item" onclick="leaveDesktopRoom()">🚪 Sair da Sala</div>
    </div>

  </div>

</body>
</html>
