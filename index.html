<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Desktop Sandbox - Edição Definitiva Multiplayer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }

  /* ── TELA DE LOBBY/LOGIN ── */
  #lobbyScreen {
    position: fixed; inset: 0;
    background: radial-gradient(circle at center, #15243a 0%, #0b1017 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 99999;
  }
  .lobby-card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 40px;
    width: 400px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    text-align: center;
  }
  .lobby-card h1 { color: #fff; font-size: 26px; margin-bottom: 10px; font-weight: 400; letter-spacing: 1px; }
  .lobby-card p { color: #8a99ad; font-size: 13px; margin-bottom: 30px; }
  .lobby-group { position: relative; margin-bottom: 20px; text-align: left; }
  .lobby-group label { display: block; color: #cbd5e1; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .lobby-group input {
    width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
    color: #00ffcc; font-family: 'Courier New', monospace; font-size: 15px;
    transition: all 0.3s ease;
  }
  .lobby-group input:focus { outline: none; border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.3); }
  .btn-enter {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #00b4db, #0083b0);
    color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(0,131,176,0.4);
  }
  .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,131,176,0.6); }
  .btn-enter:active { transform: translateY(0); }

  /* ── AMBIENTE DESKTOP ── */
  #desktop {
    display: none; position: fixed; inset: 0;
    background: url('https://wallpapers.com/images/hd/windows-7-background-imfecqv6cnsicbx4.jpg') center/cover no-repeat;
    overflow: hidden;
  }
  
  /* ── CURSORES REPLICADOS ── */
  #myCursor { position: absolute; width: 19px; height: 19px; pointer-events: none; z-index: 100000; transform: translate(0, 0); }
  .remote-cursor { position: absolute; width: 19px; height: 19px; pointer-events: none; z-index: 99999; transition: left 0.1s linear, top 0.1s linear; }
  .remote-cursor-tag {
    position: absolute; top: 18px; left: 12px;
    background: rgba(20, 20, 30, 0.9); color: #00ffcc;
    font-size: 11px; font-family: monospace; padding: 2px 6px;
    border: 1px solid rgba(0,255,204,0.5); border-radius: 3px;
    white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  /* ── BARRA DE TAREFAS WINDOWS 7 STYLE ── */
  #taskbar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
    background: linear-gradient(to bottom, rgba(40,55,75,0.7) 0%, rgba(16,24,36,0.85) 100%);
    backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; padding: 0 10px; gap: 10px; z-index: 9999;
  }
  #startBtn {
    width: 36px; height: 36px; border-radius: 50%;
    background: radial-gradient(circle, #52b3ff 0%, #0053a6 70%, #002d62 100%);
    border: 1px solid rgba(255,255,255,0.4); cursor: pointer;
    box-shadow: 0 0 8px rgba(82,179,255,0.6), inset 0 2px 4px rgba(255,255,255,0.6);
    transition: filter 0.2s;
  }
  #startBtn:hover { filter: brightness(1.2) drop-shadow(0 0 6px #52b3ff); }
  
  .taskbar-app {
    height: 30px; padding: 0 15px; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
    color: #fff; font-size: 12px; display: flex; align-items: center;
    gap: 6px; cursor: pointer; transition: background 0.2s;
  }
  .taskbar-app:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }

  /* ── SISTEMA DE JANELAS (SKEUOMÓRFICO) ── */
  .win-window {
    position: absolute; width: 650px; height: 500px;
    background: rgba(230, 235, 245, 0.9); backdrop-filter: blur(10px);
    border-radius: 8px 8px 3px 3px; border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.1);
    display: none; flex-direction: column; overflow: hidden; z-index: 1000;
  }
  .win-header {
    padding: 10px 14px; background: linear-gradient(to bottom, rgba(255,255,255,0.5) 0%, rgba(200,215,235,0.4) 100%);
    border-bottom: 1px solid rgba(0,0,0,0.15); display: flex; align-items: center;
    justify-content: space-between; cursor: move;
  }
  .win-title { font-size: 13px; color: #1e293b; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .win-controls { display: flex; gap: 6px; }
  .win-btn {
    width: 28px; height: 18px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
    background: linear-gradient(to bottom, #fff, #e1e7f0); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold;
  }
  .win-btn.close { background: linear-gradient(to bottom, #ff8484, #cc3333); color: white; border-color: #991b1b; }
  .win-btn.close:hover { background: linear-gradient(to bottom, #ff5555, #aa1111); }
  .win-body { flex: 1; position: relative; background: #fff; overflow: hidden; }

  /* ── PAINT STUDIO COMPARTILHADO ── */
  #paintContainer { display: flex; flex-direction: column; height: 100%; }
  .paint-toolbar {
    padding: 8px; background: #f1f5f9; border-bottom: 1px solid #cbd5e1;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .paint-tools { display: flex; gap: 6px; }
  .tool-btn {
    padding: 6px 12px; background: #fff; border: 1px solid #cbd5e1;
    border-radius: 4px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .tool-btn.active { background: #0083b0; color: white; border-color: #0053a6; }
  .paint-colors { display: flex; gap: 5px; align-items: center; border-left: 1px solid #cbd5e1; padding-left: 12px; }
  .color-swatch { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); transition: transform 0.1s; }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: #000; box-shadow: 0 0 0 2px #00ffcc; }
  .paint-canvas-wrap { flex: 1; position: relative; background: #fff; cursor: crosshair; }
  #paintCanvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ── ENTIDADES STICKMAN ── */
  .stickman-container { position: absolute; cursor: grab; z-index: 5000; text-align: center; display: flex; flex-direction: column; align-items: center; }
  .stickman-container:active { cursor: grabbing; }
  .stickman-nametag {
    font-family: monospace; font-size: 11px; font-weight: bold;
    color: #fff; background: rgba(15, 23, 42, 0.85);
    padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
    white-space: nowrap; margin-bottom: 4px; pointer-events: none;
  }
  .stickman-canvas { display: block; pointer-events: none; }
  .stickman-hp-container { width: 60px; height: 5px; background: #475569; border-radius: 3px; overflow: hidden; margin-top: 4px; border: 1px solid rgba(0,0,0,0.3); pointer-events: none; }
  .stickman-hp-bar { height: 100%; background: #22c55e; width: 100%; transition: width 0.15s ease, background 0.3s; }
  
  /* BALÃO DE DIÁLOGO IA */
  .stickman-bubble {
    position: absolute; bottom: 115px; background: #ffffff;
    color: #0f172a; border: 2px solid #0f172a; padding: 6px 12px;
    border-radius: 12px; font-size: 12px; font-weight: bold; max-width: 160px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2); pointer-events: none;
    word-wrap: break-word; text-align: center; z-index: 6000;
    animation: popBubble 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  .stickman-bubble::after {
    content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    border-width: 8px 8px 0; border-style: solid; border-color: #ffffff transparent; display: block; width: 0;
  }
  .stickman-bubble::before {
    content: ''; position: absolute; bottom: -11px; left: 50%; transform: translateX(-50%);
    border-width: 9px 9px 0; border-style: solid; border-color: #0f172a transparent; display: block; width: 0; z-index: -1;
  }
  @keyframes popBubble { from { transform: scale(0) translateX(-50%); transform-origin: bottom center; } to { transform: scale(1) translateX(-50%); } }

  /* ── CONTEXT MENU DO DESKTOP ── */
  #contextMenu {
    position: absolute; background: rgba(248, 250, 252, 0.95);
    backdrop-filter: blur(10px); border: 1px solid #cbd5e1; border-radius: 6px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25); width: 180px; display: none;
    flex-direction: column; padding: 4px 0; z-index: 999999;
  }
  .menu-item {
    padding: 8px 14px; font-size: 12px; color: #334155; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: background 0.15s, color 0.15s;
  }
  .menu-item:hover { background: #0083b0; color: white; }
  .menu-sep { height: 1px; background: #e2e8f0; margin: 4px 0; }

  /* ── INJEÇÕES DE COMBATE / PODERES (FX) ── */
  .fx-beam { position: absolute; height: 4px; background: linear-gradient(90deg, #ff0055, #ffcc00); z-index: 8888; pointer-events: none; box-shadow: 0 0 12px #ff0055; transform-origin: left center; }
  .fx-orb { position: absolute; width: 30px; height: 30px; background: radial-gradient(circle, #00ffff, #0053a6); border-radius: 50%; z-index: 8888; pointer-events: none; box-shadow: 0 0 15px #00ffff; }
</style>
</head>
<body>

<div id="lobbyScreen">
  <div class="lobby-card">
    <h1>🖥️ Desktop Sandbox Network</h1>
    <p>Conecte-se e gerencie entidades de IA em tempo real</p>
    <div class="lobby-group">
      <label>Seu Nickname</label>
      <input type="text" id="inputNick" placeholder="Ex: Void, Emily, Player1" maxlength="15">
    </div>
    <div class="lobby-group">
      <label>Código da Sala</label>
      <input type="text" id="inputRoom" placeholder="Ex: sala123" maxlength="15">
    </div>
    <button class="btn-enter" id="btnJoin">ACESSAR MATRIX</button>
  </div>
</div>

<div id="desktop">
  <div id="myCursor">
    <svg viewBox="0 0 20 20" style="width:100%; height:100%;">
      <polygon points="0,0 0,15 4.5,11 8,17 10,16 6.5,10.5 12,10.5" fill="white" stroke="black" stroke-width="1.2"/>
    </svg>
  </div>

  <div id="paintWindow" class="win-window">
    <div class="win-header">
      <div class="win-title">🎨 Paint Studio Compartilhado</div>
      <div class="win-controls">
        <button class="win-btn close" onclick="document.getElementById('paintWindow').style.display='none'">X</button>
      </div>
    </div>
    <div class="win-body">
      <div id="paintContainer">
        <div class="paint-toolbar">
          <div class="paint-tools">
            <button class="tool-btn active" id="toolPencil">✏️ Pincel</button>
            <button class="tool-btn" id="toolEraser">🧽 Borracha</button>
            <button class="tool-btn" id="toolClear" style="background:#fee2e2; border-color:#fca5a5;">🗑️ Limpar Tudo</button>
          </div>
          <div class="paint-colors">
            <div class="color-swatch active" style="background:#000000;" data-color="#000000"></div>
            <div class="color-swatch" style="background:#ef4444;" data-color="#ef4444"></div>
            <div class="color-swatch" style="background:#22c55e;" data-color="#22c55e"></div>
            <div class="color-swatch" style="background:#3b82f6;" data-color="#3b82f6"></div>
            <div class="color-swatch" style="background:#eab308;" data-color="#eab308"></div>
            <div class="color-swatch" style="background:#a855f7;" data-color="#a855f7"></div>
          </div>
        </div>
        <div class="paint-canvas-wrap">
          <canvas id="paintCanvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div id="contextMenu">
    <div class="menu-item" id="ctxSpawnNormal">🤖 Criar Stickman Comum</div>
    <div class="menu-item" id="ctxSpawnGod">⚡ Criar Entidade Divina</div>
    <div class="menu-sep"></div>
    <div class="menu-item" id="ctxOpenPaint">🎨 Abrir Paint Studio</div>
    <div class="menu-sep"></div>
    <div class="menu-item" id="ctxClearRoom" style="color:#dc2626;">💥 Resetar Elementos</div>
  </div>

  <div id="taskbar">
    <button id="startBtn" id="winStartMenu"></button>
    <div class="taskbar-app" id="taskbarPaint">🎨 Paint Studio</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, get, onValue, remove, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://stickland-3ccaa-default-rtdb.firebaseio.com",
  projectId: "stickland-3ccaa",
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// Chave da API Groq integrada de forma robusta
const GROQ_API = "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";

let myId = 'usr_' + Math.random().toString(36).slice(2, 11);
let myNick = '';
let roomId = '';

const remoteCursors = {};
const stickmans = {};
let activeTool = 'pencil';
let activeColor = '#000000';

// Elementos da interface
const lobbyScreen = document.getElementById('lobbyScreen');
const desktop = document.getElementById('desktop');
const myCursor = document.getElementById('myCursor');
const contextMenu = document.getElementById('contextMenu');
const paintCanvas = document.getElementById('paintCanvas');
const paintCtx = paintCanvas.getContext('2d');

let lastCtxX = 0, lastCtxY = 0;

// INICIAR CONEXÃO PELO LOBBY
document.getElementById('btnJoin').addEventListener('click', () => {
  myNick = document.getElementById('inputNick').value.trim();
  roomId = document.getElementById('inputRoom').value.trim().toLowerCase();
  
  if (!myNick || !roomId) {
    alert("Por favor, preencha o seu apelido e o código da sala de rede.");
    return;
  }
  
  lobbyScreen.style.display = 'none';
  desktop.style.display = 'block';
  
  startNetworkSandbox();
});

function startNetworkSandbox() {
  initializeCursorTracking();
  initializeStickmanSync();
  initializeWindowManagers();
  initializeSharedPaint();
  initializeContextMenu();
}

// ── CÉREBRO DE INTELIGÊNCIA ARTIFICIAL (GROQ LLM) ──
async function processGroqBrain(systemDefinition, interactionContext) {
  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { 
        "Authorization": `Bearer ${GROQ_API}`, 
        "Content-Type": "application/json" 
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          { role: "system", content: systemDefinition },
          { role: "user", content: interactionContext }
        ],
        temperature: 0.85,
        max_tokens: 60
      })
    });
    const parsed = await response.json();
    return parsed.choices[0].message.content.trim().replace(/["']/g, "");
  } catch (error) {
    return "Falha de pulso neural...";
  }
}

// ── SISTEMA REPLICADO DE CURSORES MULTIPLAYER SEM LIMITE DE TELAS ──
function initializeCursorTracking() {
  // Rastreamento local
  window.addEventListener('mousemove', (e) => {
    myCursor.style.left = e.clientX + 'px';
    myCursor.style.top = e.clientY + 'px';
    
    if (roomId && myId) {
      set(ref(db, `desktopRooms/${roomId}/cursors/${myId}`), {
        x: e.clientX,
        y: e.clientY,
        nick: myNick,
        t: Date.now()
      });
    }
  });

  // Escuta global de cursores remotos (Atualiza e renderiza todos os mouses conectados na sala)
  onValue(ref(db, `desktopRooms/${roomId}/cursors`), (snapshot) => {
    if (!snapshot.exists()) return;
    const nodes = snapshot.val();
    const serverTime = Date.now();

    // Limpar cursores mortos ou inativos da tela
    Object.keys(remoteCursors).forEach(uid => {
      if (!nodes[uid] || uid === myId || (serverTime - nodes[uid].t > 8000)) {
        remoteCursors[uid].el.remove();
        delete remoteCursors[uid];
      }
    });

    // Criar ou atualizar coordenadas de cada mouse
    Object.entries(nodes).forEach(([uid, data]) => {
      if (uid === myId) return;
      if (serverTime - data.t > 8000) return; // descarta inativo

      if (!remoteCursors[uid]) {
        const wrap = document.createElement('div');
        wrap.className = 'remote-cursor';
        wrap.innerHTML = `
          <svg viewBox="0 0 20 20" style="width:20px; height:20px;">
            <polygon points="0,0 0,15 4.5,11 8,17 10,16 6.5,10.5 12,10.5" fill="red" stroke="white" stroke-width="1.2"/>
          </svg>
          <div class="remote-cursor-tag">${data.nick}</div>
        `;
        desktop.appendChild(wrap);
        remoteCursors[uid] = { el: wrap };
      }

      remoteCursors[uid].el.style.left = data.x + 'px';
      remoteCursors[uid].el.style.top = data.y + 'px';
    });
  });
}

// ── SISTEMA DE DESENHO COMPARTILHADO (PAINT CO-OP REAL-TIME) ──
function initializeSharedPaint() {
  function resizeCanvas() {
    const box = paintCanvas.parentElement;
    paintCanvas.width = box.clientWidth;
    paintCanvas.height = box.clientHeight;
    paintCtx.lineCap = 'round';
  }
  
  // Observa alteração de tamanho para redimensionar a viewport
  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 500);

  let isDrawingLocally = false;

  paintCanvas.addEventListener('mousedown', (e) => {
    isDrawingLocally = true;
    const rect = paintCanvas.getBoundingClientRect();
    lastCtxX = e.clientX - rect.left;
    lastCtxY = e.clientY - rect.top;
  });

  paintCanvas.addEventListener('mousemove', (e) => {
    if (!isDrawingLocally) return;
    const rect = paintCanvas.getBoundingClientRect();
    const currX = e.clientX - rect.left;
    const currY = e.clientY - rect.top;

    const brushColor = activeTool === 'eraser' ? '#ffffff' : activeColor;
    const brushSize = activeTool === 'eraser' ? 24 : 4;

    // Dispara o traço direto para a rede Firebase
    const strokeRef = push(ref(db, `desktopRooms/${roomId}/paintStrokes`));
    set(strokeRef, {
      x1: lastCtxX, y1: lastCtxY,
      x2: currX, y2: currY,
      color: brushColor,
      size: brushSize
    });

    lastCtxX = currX;
    lastCtxY = currY;
  });

  window.addEventListener('mouseup', () => { isDrawingLocally = false; });

  // Escutador Firebase Realtime - Renderiza o traço de qualquer player instantaneamente na tela local
  onChildAdded(ref(db, `desktopRooms/${roomId}/paintStrokes`), (snapshot) => {
    if (!snapshot.exists()) return;
    const stroke = snapshot.val();
    
    paintCtx.beginPath();
    paintCtx.strokeStyle = stroke.color;
    paintCtx.lineWidth = stroke.size;
    paintCtx.moveTo(stroke.x1, stroke.y1);
    paintCtx.lineTo(stroke.x2, stroke.y2);
    paintCtx.stroke();
  });

  // Toolbar de comandos locais do Paint
  document.getElementById('toolPencil').addEventListener('click', (e) => {
    activeTool = 'pencil';
    resetToolClasses(); e.target.classList.add('active');
  });
  document.getElementById('toolEraser').addEventListener('click', (e) => {
    activeTool = 'eraser';
    resetToolClasses(); e.target.classList.add('active');
  });
  document.getElementById('toolClear').addEventListener('click', () => {
    if (confirm("Deseja apagar o quadro compartilhado para todos os usuários?")) {
      remove(ref(db, `desktopRooms/${roomId}/paintStrokes`));
      paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
    }
  });

  document.querySelectorAll('.color-swatch').forEach(swatch => {
    swatch.addEventListener('click', (e) => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
      activeColor = swatch.getAttribute('data-color');
      activeTool = 'pencil';
      resetToolClasses(); document.getElementById('toolPencil').classList.add('active');
    });
  });

  function resetToolClasses() {
    document.getElementById('toolPencil').classList.remove('active');
    document.getElementById('toolEraser').classList.remove('active');
  }

  // Escuta para limpezas globais de tela do Canvas
  onValue(ref(db, `desktopRooms/${roomId}/paintStrokes`), (snap) => {
    if (!snap.exists()) {
      paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
    }
  });
}

// ── MANIPULADORES DE JANELA E MENUS DRAGGABLES ──
function initializeWindowManagers() {
  document.getElementById('taskbarPaint').addEventListener('click', () => {
    const win = document.getElementById('paintWindow');
    win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
    if(win.style.display === 'flex') {
      win.style.top = '100px'; win.style.left = '150px';
    }
  });

  // Configuração genérica de arrastamento de janelas virtuais (Draggable)
  document.querySelectorAll('.win-window').forEach(win => {
    const header = win.querySelector('.win-header');
    let isDraggingWindow = false;
    let startX, startY;

    header.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('win-btn')) return;
      isDraggingWindow = true;
      win.style.zIndex = '50000';
      startX = e.clientX - win.offsetLeft;
      startY = e.clientY - win.offsetTop;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDraggingWindow) return;
      win.style.left = (e.clientX - startX) + 'px';
      win.style.top = (e.clientY - startY) + 'px';
    });

    window.addEventListener('mouseup', () => { isDraggingWindow = false; });
  });
}

// ── MENU DE CONTEXTO CLIQUE DIREITO ──
let clickPositionX = 100, clickPositionY = 100;
function initializeContextMenu() {
  window.addEventListener('contextmenu', (e) => {
    const activeWin = e.target.closest('.win-window');
    if (activeWin) return; // Permite menu interno nativo nas caixas ou janelas se necessário

    e.preventDefault();
    clickPositionX = e.clientX;
    clickPositionY = e.clientY;
    
    contextMenu.style.left = clickPositionX + 'px';
    contextMenu.style.top = clickPositionY + 'px';
    contextMenu.style.display = 'flex';
  });

  window.addEventListener('click', () => { contextMenu.style.display = 'none'; });

  document.getElementById('ctxSpawnNormal').addEventListener('click', () => {
    const name = prompt("Insira o nome do seu Stickman:");
    if (name) spawnStickmanOnNetwork(name, clickPositionX, clickPositionY, false);
  });

  document.getElementById('ctxSpawnGod').addEventListener('click', () => {
    const name = prompt("Insira o nome da Entidade Divina:");
    if (name) spawnStickmanOnNetwork(name, clickPositionX, clickPositionY, true);
  });

  document.getElementById('ctxOpenPaint').addEventListener('click', () => {
    const pWin = document.getElementById('paintWindow');
    pWin.style.display = 'flex';
    pWin.style.left = clickPositionX + 'px'; pWin.style.top = clickPositionY + 'px';
  });

  document.getElementById('ctxClearRoom').addEventListener('click', () => {
    if (confirm("Isso irá eliminar todas as entidades de IA da sala atual. Confirmar?")) {
      remove(ref(db, `desktopRooms/${roomId}/items`));
    }
  });
}

// ── CENTRAL DE REPLICAÇÃO DAS ENTIDADES VIVAS (STICKMAN SYNC) ──
function spawnStickmanOnNetwork(name, x, y, isGod = false) {
  const generatedId = 'sm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  const hpPool = isGod ? 500 : 100;
  
  const rawLower = name.toLowerCase();

  const definition = {
    id: generatedId,
    name: name,
    x: x,
    y: y,
    creator: myNick,
    creatorId: myId,
    hp: hpPool,
    maxHp: hpPool,
    isGod: isGod,
    skills: {
      fly: isGod || rawLower.includes('chaos') || rawLower.includes('angel'),
      laser: isGod || rawLower.includes('laser') || rawLower.includes('dark'),
      fireball: isGod || rawLower.includes('fire') || rawLower.includes('pyro'),
      speed: rawLower.includes('ninja') || rawLower.includes('speed') || isGod
    },
    draggedBy: '',
    lastMessage: 'Fui injetado no sistema.',
    msgTime: Date.now()
  };

  set(ref(db, `desktopRooms/${roomId}/items/${generatedId}`), definition);
}

function initializeStickmanSync() {
  onValue(ref(db, `desktopRooms/${roomId}/items`), (snapshot) => {
    if (!snapshot.exists()) {
      // Deleta instâncias visuais que sumiram do DB
      Object.keys(stickmans).forEach(id => {
        stickmans[id].el.remove();
        delete stickmans[id];
      });
      return;
    }

    const currentNetworkEntities = snapshot.val();
    const networkIds = Object.keys(currentNetworkEntities);

    // Remove locais deletados por terceiros
    Object.keys(stickmans).forEach(id => {
      if (!networkIds.includes(id)) {
        stickmans[id].el.remove();
        delete stickmans[id];
      }
    });

    // Atualiza ou injeta novos stickmans na viewport
    networkIds.forEach(id => {
      const netData = currentNetworkEntities[id];
      if (!stickmans[id]) {
        buildVisualStickman(id, netData);
      } else {
        refreshStickmanState(id, netData);
      }
    });
  });
}

function buildVisualStickman(id, data) {
  const container = document.createElement('div');
  container.className = 'stickman-container';
  container.style.left = data.x + 'px';
  container.style.top = data.y + 'px';
  
  container.innerHTML = `
    <div class="stickman-nametag">${data.name}</div>
    <canvas class="stickman-canvas" width="70" height="90"></canvas>
    <div class="stickman-hp-container"><div class="stickman-hp-bar"></div></div>
  `;

  desktop.appendChild(container);

  const instance = {
    id: id,
    el: container,
    networkData: data,
    vx: 0,
    vy: 0,
    localX: data.x,
    localY: data.y,
    ticks: 0,
    targetX: data.x,
    targetY: data.y,
    isDraggingLocally: false,
    lastMsgTimestamp: 0
  };

  stickmans[id] = instance;

  // Ativação do Arrasto pelo Mouse Sincronizado
  container.addEventListener('mousedown', (e) => {
    instance.isDraggingLocally = true;
    update(ref(db, `desktopRooms/${roomId}/items/${id}`), { draggedBy: myId });
  });

  window.addEventListener('mousemove', (e) => {
    if (!instance.isDraggingLocally) return;
    instance.localX = e.clientX - 35;
    instance.localY = e.clientY - 45;
    
    // Força atualização direta imediata na nuvem para os outros observarem a movimentação do mouse
    update(ref(db, `desktopRooms/${roomId}/items/${id}`), { x: instance.localX, y: instance.localY });
  });

  window.addEventListener('mouseup', () => {
    if (instance.isDraggingLocally) {
      instance.isDraggingLocally = false;
      update(ref(db, `desktopRooms/${roomId}/items/${id}`), { draggedBy: '' });
    }
  });

  // Desencadeia Loop de Física e IA individual da entidade
  runEntityLoop(id);
}

function refreshStickmanState(id, networkData) {
  const stick = stickmans[id];
  if (!stick) return;

  stick.networkData = networkData;
  
  // Se outra pessoa está arrastando o stickman, força a atualização da posição local baseado na rede
  if (networkData.draggedBy && networkData.draggedBy !== myId) {
    stick.localX = networkData.x;
    stick.localY = networkData.y;
  }

  // Atualização da barra de HP
  const hpPct = Math.max(0, (networkData.hp / networkData.maxHp) * 100);
  const bar = stick.el.querySelector('.stickman-hp-bar');
  if (bar) {
    bar.style.width = hpPct + '%';
    if (hpPct < 30) bar.style.background = '#ef4444';
    else if (hpPct < 60) bar.style.background = '#eab308';
    else bar.style.background = '#22c55e';
  }

  // Monitoria de Mensagens enviadas via IA à Nuvem
  if (networkData.lastMessage && networkData.msgTime > stick.lastMsgTimestamp) {
    stick.lastMsgTimestamp = networkData.msgTime;
    displayBubbleSpeech(stick.el, networkData.lastMessage);
  }
}

// ── LOOP CORE DE FÍSICA E INTELIGÊNCIA ARTIFICIAL INDIVIDUAL DE REDE ──
function runEntityLoop(id) {
  const stick = stickmans[id];
  if (!stick) return;

  const canvas = stick.el.querySelector('.stickman-canvas');
  const ctx = canvas.getContext('2d');

  function updateFrame() {
    if (!stickmans[id]) return; // Interrompe loop se a entidade foi desfeita

    const net = stick.networkData;
    const isOwner = (net.creatorId === myId); // Só quem gerou roda cálculos lógicos principais (Network Ownership)
    const isBeingDragged = !!net.draggedBy;
    
    stick.ticks++;

    const W = window.innerWidth;
    const H = window.innerHeight - 40; // desconta a barra de tarefas do chão

    if (isOwner && !isBeingDragged && net.hp > 0) {
      // Lógica de Movimentação e Tomada de Decisão Autônoma (Roda no Dono da Entidade)
      if (stick.ticks % 100 === 0) {
        // Define alvos de caminhada randômicos no monitor
        stick.targetX = Math.random() * (W - 80);
        if (net.skills.fly) {
          stick.targetY = Math.random() * (H - 120);
        } else {
          stick.targetY = H - 90;
        }

        // Sistema AI de Combate e Hostilidade
        const targets = Object.values(stickmans).filter(s => s.id !== id && s.networkData.hp > 0);
        if (targets.length > 0 && Math.random() < 0.45) {
          const victim = targets[Math.floor(Math.random() * targets.length)];
          stick.targetX = victim.localX;
          if (net.skills.fly) stick.targetY = victim.localY;

          // Executa processamento de combate próximo
          const range = Math.hypot(victim.localX - stick.localX, victim.localY - stick.localY);
          if (range < 250) {
            triggerCombatSkill(stick, victim);
          }
        }

        // Comportamento Social Autônomo via Groq API
        if (Math.random() < 0.25) {
          const systemDef = `Você é um stickman simulado chamado ${net.name} vivendo no desktop de uma tela. Seu criador é ${net.creator}. Responda com frases curtas de até 7 palavras no máximo, agindo com base em sua personalidade.`;
          const contextPrompt = `Gere uma fala aleatória enquanto você caminha pela área de trabalho. Status Divino: ${net.isGod}.`;
          
          processGroqBrain(systemDef, contextPrompt).then(dialog => {
            if (dialog && stickmans[id]) {
              update(ref(db, `desktopRooms/${roomId}/items/${id}`), {
                lastMessage: dialog,
                msgTime: Date.now()
              });
            }
          });
        }
      }

      // Aplicação Vetorial de Física Real-Time
      const diffX = stick.targetX - stick.localX;
      const stepAcceleration = net.skills.speed ? 0.9 : 0.35;
      
      stick.vx += diffX > 0 ? stepAcceleration : -stepAcceleration;
      stick.vx *= 0.82; // Amortecimento/Fricção de arrasto

      if (net.skills.fly) {
        const diffY = stick.targetY - stick.localY;
        stick.vy += diffY > 0 ? stepAcceleration : -stepAcceleration;
        stick.vy *= 0.82;
      } else {
        // Gravidade padrão para não voadores
        stick.vy += 0.55;
      }

      stick.localX += stick.vx;
      stick.localY += stick.vy;

      // Colisões e Trava de Limites do Monitor
      if (!net.skills.fly && stick.localY >= H - 90) {
        stick.localY = H - 90;
        stick.vy = 0;
        if (Math.random() < 0.05) stick.vy = -12; // Pulo randômico natural
      }
      if (stick.localX < 0) { stick.localX = 0; stick.vx = 0; }
      if (stick.localX > W - 70) { stick.localX = W - 70; stick.vx = 0; }
      if (net.skills.fly && stick.localY < 0) { stick.localY = 0; stick.vy = 0; }

      // Envia coordenadas calculadas via autoridade local para a rede a cada 3 frames econômicos
      if (stick.ticks % 3 === 0) {
        update(ref(db, `desktopRooms/${roomId}/items/${id}`), {
          x: stick.localX,
          y: stick.localY
        });
      }
    } else if (!isBeingDragged) {
      // Interpolação suave para clientes espectadores do elemento
      stick.localX += (net.x - stick.localX) * 0.25;
      stick.localY += (net.y - stick.localY) * 0.25;
    }

    // Renderização do CSS na viewport
    stick.el.style.left = stick.localX + 'px';
    stick.el.style.top = stick.localY + 'px';

    // Inversão do Sprite baseada no vetor de velocidade
    if (stick.vx < -0.4) {
      canvas.style.transform = 'scaleX(-1)';
    } else if (stick.vx > 0.4) {
      canvas.style.transform = 'scaleX(1)';
    }

    // Animação procedural de desenho do Boneco Palito
    renderStickmanGraphics(ctx, stick.ticks, stick.vx);

    requestAnimationFrame(updateFrame);
  }

  requestAnimationFrame(updateFrame);
}

// ── EXECUTOR DE ATAQUES E HABILIDADES ESPECIAIS (FX + DANOS REPLICADOS) ──
function triggerCombatSkill(attacker, defender) {
  const netAtk = attacker.networkData;
  const netDef = defender.networkData;
  
  let dmg = 6;
  
  if (netAtk.skills.laser && Math.random() < 0.5) {
    dmg = 20;
    renderLaserBeamFX(attacker.localX + 35, attacker.localY + 40, defender.localX + 35, defender.localY + 40);
  } else if (netAtk.skills.fireball && Math.random() < 0.5) {
    dmg = 30;
    renderFireballOrbFX(attacker.localX + 35, attacker.localY + 40, defender.localX + 35, defender.localY + 40);
  }

  // Processa redução de vida e salva diretamente na árvore do alvo
  const updatedHp = Math.max(0, netDef.hp - dmg);
  update(ref(db, `desktopRooms/${roomId}/items/${defender.id}`), { hp: updatedHp });

  // Exclui a entidade da rede caso o HP seja zerado (Morte assistida por delay de animação)
  if (updatedHp <= 0) {
    const systemDef = `Você é o stickman ${netAtk.name}. Você acabou de matar o inimigo ${netDef.name} em combate na área de trabalho. Grite uma frase curta e cruel de vitória (até 5 palavras).`;
    processGroqBrain(systemDef, "Venci o combate!").then(phrase => {
      if (phrase) update(ref(db, `desktopRooms/${roomId}/items/${attacker.id}`), { lastMessage: phrase, msgTime: Date.now() });
    });
    
    setTimeout(() => {
      remove(ref(db, `desktopRooms/${roomId}/items/${defender.id}`));
    }, 1000);
  }
}

// ── VISUAIS FX DINÂMICOS NA TELA ──
function renderLaserBeamFX(x1, y1, x2, y2) {
  const line = document.createElement('div');
  line.className = 'fx-beam';
  const distance = Math.hypot(x2 - x1, y2 - y1);
  const radAngle = Math.atan2(y2 - y1, x2 - x1);
  
  line.style.width = distance + 'px';
  line.style.left = x1 + 'px';
  line.style.top = y1 + 'px';
  line.style.transform = `rotate(${radAngle * 180 / Math.PI}deg)`;
  
  desktop.appendChild(line);
  setTimeout(() => line.remove(), 250);
}

function renderFireballOrbFX(x1, y1, x2, y2) {
  const orb = document.createElement('div');
  orb.className = 'fx-orb';
  orb.style.left = x1 + 'px';
  orb.style.top = y1 + 'px';
  desktop.appendChild(orb);

  orb.animate([
    { left: x1 + 'px', top: y1 + 'px' },
    { left: x2 + 'px', top: y2 + 'px' }
  ], { duration: 350, easing: 'ease-out' }).onfinish = () => orb.remove();
}

// RENDERIZADOR GRÁFICO DO CANVAS PROCEDURAL (ANIMAÇÃO DAS PERNAS E TRONCO)
function renderStickmanGraphics(ctx, ticks, vx) {
  ctx.clearRect(0, 0, 70, 90);
  
  const speedFactor = Math.abs(vx) > 0.5 ? Math.abs(vx) * 0.15 : 0.05;
  const swing = Math.sin(ticks * (0.15 + speedFactor)) * 7;
  const bobbing = Math.abs(Math.cos(ticks * 0.1)) * 3;

  ctx.strokeStyle = '#0f172a';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';

  const headX = 35;
  const headY = 22 + bobbing;
  
  // 1. Cabeça
  ctx.beginPath();
  ctx.arc(headX, headY, 9, 0, Math.PI * 2);
  ctx.stroke();

  // 2. Corpo/Espinha
  ctx.beginPath();
  ctx.moveTo(headX, headY + 9);
  ctx.lineTo(headX, headY + 38);
  ctx.stroke();

  // 3. Braços
  ctx.beginPath();
  ctx.moveTo(headX - 15, headY + 18 + swing);
  ctx.lineTo(headX, headY + 15);
  ctx.lineTo(headX + 15, headY + 18 - swing);
  ctx.stroke();

  // 4. Pernas (Procedural de caminhada)
  ctx.beginPath();
  ctx.moveTo(headX, headY + 38);
  ctx.lineTo(headX - 12, headY + 62 + swing);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(headX, headY + 38);
  ctx.lineTo(headX + 12, headY + 62 - swing);
  ctx.stroke();
}

function displayBubbleSpeech(parentElement, text) {
  const dynamicBubble = parentElement.querySelector('.stickman-bubble');
  if (dynamicBubble) dynamicBubble.remove();

  const bubble = document.createElement('div');
  bubble.className = 'stickman-bubble';
  bubble.textContent = text;
  
  parentElement.appendChild(bubble);
  setTimeout(() => { if (bubble) bubble.remove(); }, 5000);
}
</script>
